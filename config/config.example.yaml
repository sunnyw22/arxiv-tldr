# Research Radar — Example Configuration
# Copy this file to config.yaml and customize for your research profile.

# --- User Profile ---
# Describes what you care about (generic, not tied to any specific source)
profile:
  # Specific topic interests (used for relevance scoring)
  topic_interests:
    - "large language models"
    - "retrieval-augmented generation"
    - "reasoning in LLMs"

  # Keywords or phrases that boost relevance
  required_signals:
    - "benchmark"
    - "evaluation"

  # Keywords or phrases that reduce relevance (papers matching these are deprioritized)
  negative_filters:
    - "survey only"
    - "workshop abstract"

  # Short description of your current research focus (helps LLM-based ranking)
  project_context: >
    I am studying how retrieval-augmented generation can improve
    factual accuracy in domain-specific question answering.

  # Your expertise level: beginner, intermediate, advanced, expert
  expertise_level: "advanced"

# --- Sources ---
# Configures where to look for papers (source-specific settings)
sources:
  arxiv:
    enabled: true
    # arXiv categories to monitor
    categories:
      - "hep-ex"
      - "hep-ph"
      - "stat.ML"
      - "cs.LG"

  inspire:
    enabled: true
    # INSPIRE keyword searches
    keywords:
      - "tracking"
      - "machine learning"
    # INSPIRE subject categories (optional)
    subject_codes:
      - "Experiment-HEP"

# --- Summary Preferences ---
summary:
  # Style: concise, detailed, or technical
  style: "concise"

  # Maximum number of papers in the daily digest
  max_papers: 15

# --- Output Preferences ---
output:
  # Output formats to generate: markdown, html
  formats:
    - "markdown"
    - "html"

  # Directory for generated reports
  output_dir: "output/"

  # Mattermost bot integration (optional)
  # Posts a digest summary and attaches the report file to a channel.
  # Requires MATTERMOST_TOKEN env var (bot token — never put in config).
  # See README for bot setup instructions.
  # mattermost_url: "https://mattermost.example.com"
  # mattermost_channel_id: "your-channel-id-here"

# --- LLM Provider ---
llm:
  # Provider and model (via litellm format)
  model: "openai/gpt-4o-mini"

  # Temperature for summarization
  temperature: 0.3

  # Maximum tokens per summary
  max_tokens: 4096

# --- Scheduling ---
schedule:
  # For GitHub Actions or cron-based runs
  # Cron expression for daily digest (default: 8am UTC)
  cron: "0 8 * * *"

  # Timezone for display purposes
  timezone: "UTC"
